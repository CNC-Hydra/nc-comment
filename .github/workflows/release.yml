name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggered by: git tag v1.0.1 && git push --tags

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > keystore.jks
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --out NC-Kommentar-Manager.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm keystore.jks

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: NC-Kommentar-Manager.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
